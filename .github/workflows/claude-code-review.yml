name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Read,Grep,Glob,Bash(gh pr comment:),Bash(gh pr review:)"'
          prompt: |
            이 PR을 리뷰해줘.
            1. conventions/ 폴더의 네이밍 규칙.md, 디렉터리 구조.md, 코드 스타일.md, git 규칙.md 파일을 먼저 읽고 프로젝트 컨벤션을 파악해.
            2. 이번 PR(${{ github.repository }}/pull/${{ github.event.pull_request.number }})에서 변경된 코드가 이 컨벤션을 잘 지키고 있는지 확인해.
            3. 컨벤션 위반 사항이 있으면 구체적으로 지적해줘 (파일명, 라인 포함).
            4. 그 외에 버그, 성능, 보안, 가독성 측면에서 개선점이나 문제점이 있으면 함께 짚어줘.
            5. 심각도별로 정리해서 알려줘 (Critical / Warning / Suggestion).
            6. 리뷰 결과를 아래 두 가지 방식으로 모두 남겨줘.
               - 먼저 `gh pr comment ${{ github.event.pull_request.number }} --body "..."` 명령으로 상세 리뷰 내용을 일반 댓글로 남기고,
               - 이어서 Critical 이슈가 있으면 `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "요약"`,
                 없으면 `gh pr review ${{ github.event.pull_request.number }} --comment --body "요약"` 명령으로 정식 리뷰도 제출해줘.
                 (정식 리뷰는 짧은 요약만, 상세 내용은 댓글에)
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
