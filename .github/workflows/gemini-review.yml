name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt
          head -c 30000 diff.txt > diff_trimmed.txt

      - name: Collect conventions
        run: |
          cat conventions/*.md > conventions_combined.txt 2>/dev/null || true

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT=$(jq -n \
            --rawfile diff diff_trimmed.txt \
            --rawfile conventions conventions_combined.txt \
            '{
              contents: [{
                parts: [{
                  text: (
                    "너는 이 저장소의 코드 리뷰어야. 아래는 우리 팀의 코드 컨벤션 문서(네이밍, 디렉터리 구조, 코드 스타일, git 규칙)이야.\n\n---컨벤션 문서 시작---\n"
                    + $conventions
                    + "\n---컨벤션 문서 끝---\n\n"
                    + "아래는 이번 Pull Request의 diff야. 위 컨벤션을 기준으로 어긴 부분이 있는지, 버그나 개선점이 있는지 한국어로 간결하게 리뷰해줘. 컨벤션 위반이 있으면 어떤 문서의 어떤 규칙을 어겼는지 구체적으로 짚어줘. 문제가 없으면 문제 없다고만 말해줘.\n\n---diff 시작---\n"
                    + $diff
                    + "\n---diff 끝---"
                  )
                }]
              }]
            }')

          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PROMPT" \
            > raw_response.json

          echo "----- RAW GEMINI RESPONSE (DEBUG, remove after diagnosing) -----"
          cat raw_response.json
          echo "-----------------------------------------------------------------"

          jq -r '.candidates[0].content.parts[0].text // "리뷰 생성에 실패했습니다."' raw_response.json > review.txt

          cat review.txt

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Gemini Code Review\n\n${review}`,
            });
